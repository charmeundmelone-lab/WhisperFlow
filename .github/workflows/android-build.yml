name: Android CI

on:
  push:
    branches: [ main, claude/android-project-setup-tqy5h9 ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.14.3
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisperflow-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Push APK to apk-dist branch
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/claude/android-project-setup-tqy5h9'
        run: |
          APK_FILE="app/build/outputs/apk/debug/app-debug.apk"
          SHORT_SHA=$(echo "${{ github.sha }}" | head -c 7)
          WORK_DIR="/tmp/apk-dist"

          mkdir -p "$WORK_DIR"
          cp "$APK_FILE" "$WORK_DIR/app-debug.apk"
          cp "$APK_FILE" "$WORK_DIR/app-debug-${SHORT_SHA}.apk"

          cd "$WORK_DIR"
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "build: APK from ${{ github.sha }}"
          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            HEAD:apk-dist
