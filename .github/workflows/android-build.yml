name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.14.3
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"

      # On-Device Whisper: natives whisper.cpp braucht NDK + CMake
      - name: Install Android NDK and CMake
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install \
            "ndk;27.2.12479018" "cmake;3.22.1" > /dev/null

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisperflow-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Push APK to apk-dist branch
        if: github.ref == 'refs/heads/main'
        run: |
          APK_FILE="app/build/outputs/apk/debug/app-debug.apk"
          SHORT_SHA=$(echo "${{ github.sha }}" | head -c 7)
          WORK_DIR="/tmp/apk-dist"

          mkdir -p "$WORK_DIR"
          cp "$APK_FILE" "$WORK_DIR/app-debug.apk"
          cp "$APK_FILE" "$WORK_DIR/app-debug-${SHORT_SHA}.apk"

          cd "$WORK_DIR"
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "build: APK from ${{ github.sha }}"
          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            HEAD:apk-dist

      - name: Publish GitHub Release (latest)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_FILE="app/build/outputs/apk/debug/app-debug.apk"
          SHORT_SHA=$(echo "${{ github.sha }}" | head -c 7)
          BUILD_DATE=$(date -u '+%d.%m.%Y %H:%M UTC')

          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

          NOTES="Build: ${BUILD_DATE} | Commit: ${SHORT_SHA}"

          gh release create latest "$APK_FILE#app-debug.apk" \
            --title "WhisperFlow – Neueste Version" \
            --notes "$NOTES" \
            --latest
